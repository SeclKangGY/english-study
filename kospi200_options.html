<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-title">KOSPI200 옵션 <span style="font-size:13px;font-weight:500;color:#4a7a99">만기 손익 분석기</span></div>
    <div class="hdr-sub">승수 250,000원 · 최소호가 0.01pt · KRX 기준</div>
  </div>
  <div class="body">
    <div class="left" id="left"></div>
    <div class="right" id="right"></div>
  </div>
</div>

<script>
var MULT = 250000;
var STRATS = [
  {label:"직접 입력", legs:[]},
  {label:"Long Call",        legs:[{t:"C",d:"B",k:360,q:1,p:5.0}]},
  {label:"Long Put",         legs:[{t:"P",d:"B",k:360,q:1,p:4.5}]},
  {label:"Short Call",       legs:[{t:"C",d:"S",k:360,q:1,p:5.0}]},
  {label:"Short Put",        legs:[{t:"P",d:"S",k:360,q:1,p:4.5}]},
  {label:"Bull Call Spread", legs:[{t:"C",d:"B",k:355,q:1,p:7.0},{t:"C",d:"S",k:365,q:1,p:3.0}]},
  {label:"Bear Put Spread",  legs:[{t:"P",d:"B",k:365,q:1,p:7.0},{t:"P",d:"S",k:355,q:1,p:3.0}]},
  {label:"Long Straddle",    legs:[{t:"C",d:"B",k:360,q:1,p:5.0},{t:"P",d:"B",k:360,q:1,p:4.5}]},
  {label:"Short Straddle",   legs:[{t:"C",d:"S",k:360,q:1,p:5.0},{t:"P",d:"S",k:360,q:1,p:4.5}]},
  {label:"Long Strangle",    legs:[{t:"C",d:"B",k:370,q:1,p:3.0},{t:"P",d:"B",k:350,q:1,p:3.0}]},
  {label:"Long Butterfly",   legs:[{t:"C",d:"B",k:350,q:1,p:12.0},{t:"C",d:"S",k:360,q:2,p:5.0},{t:"C",d:"B",k:370,q:1,p:1.5}]},
  {label:"Risk Reversal",    legs:[{t:"C",d:"B",k:370,q:1,p:3.0},{t:"P",d:"S",k:350,q:1,p:3.0}]},
];

// ── State ──────────────────────────────────────────────────
var state = {
  si: 0,
  legs: [{t:"C",d:"B",k:null,q:1,p:null}],
  unit: "pt"
};

function autoRng(){
  var ks = state.legs.map(function(l){return l.k;}).filter(function(k){return k!==null;});
  var ctr = autoCtr();
  var spread = ks.length>=2 ? (Math.max.apply(null,ks)-Math.min.apply(null,ks))*2 : 0;
  // 기본 범위 30% + 양끝 여백 10% 추가 → 끝점이 경계에 안 걸림
  var base = Math.max(spread, ctr*0.30);
  return base * 1.20;
}

function autoCtr(){
  var ks = state.legs.map(function(l){return l.k;}).filter(function(k){return k!==null;});
  if(ks.length===0) return 360;
  return (Math.max.apply(null,ks)+Math.min.apply(null,ks))/2;
}

function mkLeg(){ return {t:"C",d:"B",k:null,q:1,p:null}; }

// ── Calc ───────────────────────────────────────────────────
function calcPayoff(legs, spot){
  return legs.reduce(function(s,l){
    if(l.k===null||l.p===null) return s;
    var sg = l.d==="B"?1:-1;
    var iv = l.t==="C"?Math.max(0,spot-l.k):Math.max(0,l.k-spot);
    return s + sg*(iv-l.p)*l.q;
  },0);
}

function krw(pt){
  var w=pt*MULT;
  if(Math.abs(w)>=1e8) return (w/1e8).toFixed(2)+"억원";
  if(Math.abs(w)>=1e4) return (w/1e4).toFixed(0)+"만원";
  return w.toFixed(0)+"원";
}
function sgn(v,d){ return (v>=0?"+":"")+v.toFixed(d); }
function fpt(c){ return c===null?"—":(c>=0?"-":"+")+Math.abs(c).toFixed(2); }
function fwon(c){ return c===null?"—":(c>=0?"-":"+")+Math.abs(c*MULT).toLocaleString(); }

// ── Chart (Canvas) ─────────────────────────────────────────
function drawChart(){
  var canvas = document.getElementById("chart-canvas");
  if(!canvas) return;
  var box = canvas.parentElement;
  var W = box.clientWidth - 28;
  var H = 380;
  canvas.width = W;
  canvas.height = H;
  var ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,W,H);

  var PAD = {top:20,right:40,bottom:40,left:90};
  var cw = W - PAD.left - PAD.right;
  var ch = H - PAD.top - PAD.bottom;

  var ctr=autoCtr(), rng=autoRng();
  var xMin = ctr - rng/2;
  var xMax = ctr + rng/2;

  // build data
  var pts = [];
  for(var i=0;i<=300;i++){
    var sp = xMin + (i/300)*(xMax-xMin);
    var pnl = calcPayoff(state.legs, sp);
    pts.push({x:sp, y: state.unit==="pt"?pnl:pnl*MULT});
  }
  var ys = pts.map(function(p){return p.y;});
  var yMin = Math.min.apply(null,ys);
  var yMax = Math.max.apply(null,ys);
  var yPad = (yMax-yMin)*0.12 || 5;
  yMin -= yPad; yMax += yPad;

  function px(x){ return PAD.left + (x-xMin)/(xMax-xMin)*cw; }
  function py(y){ return PAD.top + (1-(y-yMin)/(yMax-yMin))*ch; }

  // grid
  ctx.strokeStyle="#112030"; ctx.lineWidth=1;
  for(var gi=0;gi<=4;gi++){
    var gy = yMin + gi*(yMax-yMin)/4;
    ctx.beginPath(); ctx.moveTo(PAD.left,py(gy)); ctx.lineTo(PAD.left+cw,py(gy)); ctx.stroke();
    var lbl = state.unit==="pt"?gy.toFixed(1):(gy/1e4).toFixed(0);
    ctx.fillStyle="#4a7a99"; ctx.font="10px 'Noto Sans KR',sans-serif";
    ctx.textAlign="right"; ctx.fillText(lbl, PAD.left-5, py(gy)+3);
  }
  // x grid
  var xStep = state.rng/6;
  for(var xi=0;xi<=6;xi++){
    var gx = xMin + xi*xStep;
    ctx.beginPath(); ctx.moveTo(px(gx),PAD.top); ctx.lineTo(px(gx),PAD.top+ch); ctx.stroke();
    ctx.fillStyle="#4a7a99"; ctx.textAlign="center";
    ctx.fillText(gx.toFixed(0), px(gx), PAD.top+ch+14);
  }

  // zero line (dashed)
  if(yMin<0 && yMax>0){
    var zy = py(0);
    ctx.save();
    ctx.strokeStyle="#94a3b8"; ctx.lineWidth=1.5;
    ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.moveTo(PAD.left,zy); ctx.lineTo(PAD.left+cw,zy); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle="#94a3b8"; ctx.font="10px sans-serif"; ctx.textAlign="left";
    ctx.fillText("0", PAD.left+cw+4, zy+3);
    ctx.restore();
  }

  // breakeven lines
  var beps = [];
  for(var i=0;i<pts.length-1;i++){
    if(pts[i].y*pts[i+1].y<0){
      var x0=pts[i].x,y0=pts[i].y,x1=pts[i+1].x,y1=pts[i+1].y;
      var bx = x0-y0*(x1-x0)/(y1-y0);
      beps.push(parseFloat(bx.toFixed(2)));
      ctx.save();
      ctx.strokeStyle="#f5c842"; ctx.lineWidth=1;
      ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.moveTo(px(bx),PAD.top); ctx.lineTo(px(bx),PAD.top+ch); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle="#f5c842"; ctx.font="10px sans-serif"; ctx.textAlign="center";
      ctx.fillText(bx.toFixed(2), px(bx), PAD.top-5);
      ctx.restore();
    }
  }

  // ── 변곡점 (행사가) 십자선 표시 ──────────────────────────
  var kpts = state.legs
    .filter(function(l){ return l.k!==null && l.p!==null; })
    .map(function(l){ return l.k; });
  // 행사가 중복 제거 후 정렬
  var kUniq = kpts.filter(function(v,i,a){ return a.indexOf(v)===i; });
  kUniq.sort(function(a,b){return a-b;});

  // 행사가 1개면 좌·우 중간점 추가 (X축 구분용, Y값 표시 안함)
  var extraKs = [];
  if(kUniq.length===1){
    var k0 = kUniq[0];
    extraKs.push((xMin + k0) / 2);
    extraKs.push((k0 + xMax) / 2);
  }

  // 시작점·끝점
  var yLeftPt  = calcPayoff(state.legs, xMin);
  var yRightPt = calcPayoff(state.legs, xMax);
  // 차트 단위(pts.y와 동일)로 변환
  var yLeft  = state.unit==="pt" ? yLeftPt  : yLeftPt  * MULT;
  var yRight = state.unit==="pt" ? yRightPt : yRightPt * MULT;

  // 전체 표시 목록 구성
  var inflections = [];
  inflections.push({x:xMin, y:yLeft, isEdge:true});
  extraKs.forEach(function(k){
    var v=calcPayoff(state.legs,k);
    inflections.push({x:k, y:state.unit==="pt"?v:v*MULT, isEdge:false, noYLabel:true});
  });
  kUniq.forEach(function(k){
    var v=calcPayoff(state.legs,k);
    inflections.push({x:k, y:state.unit==="pt"?v:v*MULT, isEdge:false});
  });
  inflections.push({x:xMax, y:yRight, isEdge:true});

  // Y값 포맷
  // fmtY: 단위 표시 없이 숫자만
  function fmtY(v){
    if(state.unit==="pt") return (v>=0?"+":"")+v.toFixed(2); // pt는 소수점 2자리
    if(Math.abs(v)>=1e4) return (v>=0?"+":"")+(v/1e4).toFixed(0); // 원화는 만원 정수
    return (v>=0?"+":"")+v.toFixed(0);
  }

  // 끝점 Y값 같으면 우측(xMax)의 노란 X레이블 생략
  var skipRightXLabel = (Math.abs(yLeftPt - yRightPt) < 0.01);

  // Y레이블 겹침 방지: 사용된 Y위치 추적
  var usedYPositions = []; // {y, col}
  var drawnHLines = []; // 이미 그려진 가로선 Y값(실제 데이터값)

  inflections.forEach(function(pt){
    var ix = px(pt.x), iy = py(pt.y);
    ctx.save();

    // 세로 점선 (노란색) - 시작점(Y축 위)은 생략
    if(!(pt.isEdge && pt.x===xMin)){
      ctx.strokeStyle="#f5c842"; ctx.lineWidth=1; ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.moveTo(ix,PAD.top); ctx.lineTo(ix,PAD.top+ch); ctx.stroke();
    }

    // 가로 점선 (빨간색) - 동일 Y값이면 생략
    var dupHLine = drawnHLines.some(function(v){ return Math.abs(v - pt.y) < 0.01; });
    if(!dupHLine){
      ctx.strokeStyle="#f87171"; ctx.lineWidth=1; ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.moveTo(PAD.left, iy); ctx.lineTo(PAD.left+cw, iy); ctx.stroke();
      ctx.setLineDash([]);
      drawnHLines.push(pt.y);
    }

    // 교차점 원
    ctx.fillStyle="#ffffff";
    ctx.beginPath(); ctx.arc(ix,iy,3.5,0,Math.PI*2); ctx.fill();

    // X값 레이블 (노란, 하단)
    var showXLabel = !pt.noXLabel && !(pt.isEdge && pt.x===xMax && skipRightXLabel);
    if(showXLabel){
      ctx.fillStyle="#f5c842"; ctx.font="bold 10px 'Noto Sans KR',sans-serif"; ctx.textAlign="center";
      var tx=ix;
      if(tx<PAD.left+26) tx=PAD.left+26;
      if(tx>PAD.left+cw-26) tx=PAD.left+cw-26;
      var tyOffset = pt.isEdge ? 26 : 13;
      ctx.fillText(pt.x.toFixed(1), tx, PAD.top+ch+tyOffset);
    }

    // Y값 레이블 - 동일 Y값이면 생략
    if(dupHLine){ ctx.restore(); return; }
    // Y값 레이블 - 실제 Y위치에 고정, Y축 왼쪽에 표시
    // 같은 높이 근처에 이미 레이블이 있으면 한 칸 더 왼쪽 열에 표시
    // Y레이블 - 중간점은 생략
    if(pt.noYLabel){ ctx.restore(); return; }
    ctx.fillStyle="#f87171"; ctx.font="bold 10px 'Noto Sans KR',sans-serif";
    var yLblText = fmtY(pt.y);
    var ly = iy - 3;
    if(ly < PAD.top+8) ly = PAD.top+8;
    // 몇번째 열에 표시할지 결정 (겹치면 한 열 더 왼쪽)
    var col = 0;
    var MIN_GAP = 11;
    for(var u=0; u<usedYPositions.length; u++){
      if(Math.abs(usedYPositions[u].y - ly) < MIN_GAP && usedYPositions[u].col === col){
        col++;
        u = -1; // 처음부터 다시 체크
      }
    }
    usedYPositions.push({y:ly, col:col});
    // col 0: PAD.left-5, col 1: PAD.left-5-55, col 2: ...
    var colWidth = 52;
    ctx.textAlign="right";
    ctx.fillText(yLblText, PAD.left - 5 - col*colWidth, ly);

    ctx.restore();
  });

  // payoff line
  ctx.beginPath();
  ctx.strokeStyle="#7ec8e3"; ctx.lineWidth=2.5; ctx.lineJoin="round";
  for(var i=0;i<pts.length;i++){
    var cx2=px(pts[i].x), cy2=py(pts[i].y);
    if(i===0) ctx.moveTo(cx2,cy2); else ctx.lineTo(cx2,cy2);
  }
  ctx.stroke();

  // axis labels
  ctx.fillStyle="#4a7a99"; ctx.font="11px 'Noto Sans KR',sans-serif";
  ctx.textAlign="center";
  ctx.fillText("KOSPI200 만기지수", PAD.left+cw/2, H-4);
  ctx.save(); ctx.translate(12, PAD.top+ch/2); ctx.rotate(-Math.PI/2);
  ctx.fillText(state.unit==="pt"?"손익 (pt)":"손익 (만원)", 0, 0);
  ctx.restore();

  // tooltip canvas interaction
  canvas._pts = pts; canvas._px = px; canvas._py = py;
  canvas._xMin = xMin; canvas._xMax = xMax;
  canvas._beps = beps;
  canvas._PAD = PAD; canvas._cw = cw; canvas._ch = ch;

  return beps;
}

// ── Tooltip ────────────────────────────────────────────────
function setupTooltip(canvas){
  var tip = document.getElementById("chart-tip");
  function onMove(ex, ey){
    if(!canvas._pts) return;
    var rect = canvas.getBoundingClientRect();
    var mx = ex - rect.left, my = ey - rect.top;
    var PAD=canvas._PAD, cw=canvas._cw, ch=canvas._ch;
    if(mx<PAD.left||mx>PAD.left+cw||my<PAD.top||my>PAD.top+ch){tip.style.display="none";return;}
    var xRatio=(mx-PAD.left)/cw;
    var spot = canvas._xMin + xRatio*(canvas._xMax-canvas._xMin);
    var pnl = calcPayoff(state.legs, spot);
    var col = pnl>=0?"#4ade80":"#f87171";
    tip.innerHTML="<div style='color:#7ec8e3;margin-bottom:3px'>KOSPI200 <strong>"+spot.toFixed(2)+"</strong></div>"+
      "<div style='color:"+col+"'>손익 "+sgn(pnl,2)+" pt</div>"+
      "<div style='color:"+col+";font-size:11px;margin-top:1px'>("+krw(pnl)+")</div>";
    var tx = mx+14, ty = my-10;
    if(tx+130>canvas.width) tx=mx-144;
    tip.style.left=tx+"px"; tip.style.top=ty+"px"; tip.style.display="block";
  }
  canvas.addEventListener("mousemove",function(ev){onMove(ev.clientX,ev.clientY);});
  canvas.addEventListener("mouseleave",function(){tip.style.display="none";});
  canvas.addEventListener("touchmove",function(ev){
    ev.preventDefault();
    onMove(ev.touches[0].clientX,ev.touches[0].clientY);
  },{passive:false});
  canvas.addEventListener("touchend",function(){tip.style.display="none";});
}

// ── NumInput helper ────────────────────────────────────────
function makeNI(val, isInt, onCommit, extraStyle){
  var inp = document.createElement("input");
  inp.className="ni";
  inp.type="text";
  inp.inputMode=isInt?"numeric":"decimal";
  inp.value=val===null?"":String(val);
  inp.placeholder="—";
  if(extraStyle) inp.style.cssText=extraStyle;
  var editing=false;
  inp.addEventListener("focus",function(){
    editing=true;
    inp.value=val===null?"":String(val);
    setTimeout(function(){inp.select();},0);
  });
  inp.addEventListener("blur",function(){
    editing=false;
    var p=isInt?parseInt(inp.value,10):parseFloat(inp.value);
    var nv=(!isNaN(p)&&p>0)?p:null;
    onCommit(nv);
    inp.value=nv===null?"":String(nv);
    val=nv;
  });
  inp.addEventListener("keydown",function(e){if(e.key==="Enter")inp.blur();});
  return inp;
}

// ── Render ─────────────────────────────────────────────────
function render(){
  renderLeft();
  renderRight();
}

function renderLeft(){
  var el = document.getElementById("left");
  el.innerHTML="";

  // 전략 템플릿
  var sec1=mkSec("전략 템플릿"); el.appendChild(sec1.wrap);
  var tw=document.createElement("div"); tw.className="tag-wrap";
  STRATS.forEach(function(s,i){
    var btn=document.createElement("button");
    btn.className="tag "+(state.si===i?"on":"off");
    btn.textContent=s.label;
    btn.addEventListener("click",function(){
      state.si=i;
      if(i===0) state.legs=[mkLeg()];
      else state.legs=STRATS[i].legs.map(function(l){return {t:l.t,d:l.d,k:l.k,q:l.q,p:l.p};});
      render();
    });
    tw.appendChild(btn);
  });
  sec1.body.appendChild(tw);

  // 레그 구성
  var addBtn=document.createElement("button");
  addBtn.className="add-btn"; addBtn.textContent="+ 추가";
  addBtn.addEventListener("click",function(){state.legs.push(mkLeg());render();});
  var sec2=mkSec("레그 구성 ("+state.legs.length+"개)", addBtn);
  el.appendChild(sec2.wrap);

  state.legs.forEach(function(leg,i){
    var legEl=document.createElement("div"); legEl.className="leg";

    // top row
    var top=document.createElement("div"); top.className="leg-top";
    var num=document.createElement("span"); num.className="leg-num"; num.textContent="#"+(i+1);
    top.appendChild(num);

    // 매수/매도
    var dg=document.createElement("div"); dg.className="tog-grp";
    ["B","S"].forEach(function(v){
      var b=document.createElement("button"); b.className="tog";
      var col=v==="B"?"#4ade80":"#f87171";
      b.textContent=v==="B"?"매수":"매도";
      b.style.background=leg.d===v?col+"22":"transparent";
      b.style.color=leg.d===v?col:"#2d5a7a";
      b.style.border=leg.d===v?"1px solid "+col:"1px solid #1e3a52";
      b.addEventListener("click",function(){leg.d=v;render();});
      dg.appendChild(b);
    });
    top.appendChild(dg);

    // 콜/풋
    var tg=document.createElement("div"); tg.className="tog-grp";
    ["C","P"].forEach(function(v){
      var b=document.createElement("button"); b.className="tog";
      var col=v==="C"?"#7ec8e3":"#f5a742";
      b.textContent=v==="C"?"콜":"풋";
      b.style.background=leg.t===v?col+"22":"transparent";
      b.style.color=leg.t===v?col:"#2d5a7a";
      b.style.border=leg.t===v?"1px solid "+col:"1px solid #1e3a52";
      b.addEventListener("click",function(){leg.t=v;render();});
      tg.appendChild(b);
    });
    top.appendChild(tg);

    if(state.legs.length>1){
      var del=document.createElement("button"); del.className="del-btn"; del.textContent="✕";
      del.addEventListener("click",function(){state.legs.splice(i,1);render();});
      top.appendChild(del);
    }
    legEl.appendChild(top);

    // inputs
    var grid=document.createElement("div"); grid.className="leg-grid";
    [{lbl:"행사가",field:"k",isInt:false},{lbl:"수량",field:"q",isInt:true},{lbl:"프리미엄",field:"p",isInt:false}].forEach(function(cfg){
      var wrap=document.createElement("div");
      var lbl=document.createElement("div"); lbl.className="lbl"; lbl.textContent=cfg.lbl;
      wrap.appendChild(lbl);
      var ni=makeNI(leg[cfg.field],cfg.isInt,function(v){
        if(cfg.field==="q") leg.q=v===null?1:Math.max(1,Math.round(v));
        else leg[cfg.field]=v;
        renderRight();
      });
      wrap.appendChild(ni);
      grid.appendChild(wrap);
    });
    legEl.appendChild(grid);
    sec2.body.appendChild(legEl);
  });

  // 차트 설정
  var sec3=mkSec("차트 설정"); el.appendChild(sec3.wrap);
  var cfgWrap=document.createElement("div");

  var ur=document.createElement("div"); ur.className="unit-row";
  ["pt","won"].forEach(function(u){
    var b=document.createElement("button"); b.className="unit-btn";
    b.textContent=u==="pt"?"포인트":"원화";
    b.style.background=state.unit===u?"#7ec8e3":"#112030";
    b.style.color=state.unit===u?"#080f18":"#7ec8e3";
    b.style.border=state.unit===u?"1px solid #7ec8e3":"1px solid #1e3a52";
    b.addEventListener("click",function(){state.unit=u;renderRight();});
    ur.appendChild(b);
  });
  cfgWrap.appendChild(ur);
  sec3.body.appendChild(cfgWrap);

  // 손익 요약 (계산 후 채움)
  var sec4=mkSec("손익 요약"); el.appendChild(sec4.wrap);
  sec4.body.id="summary-box";
  updateSummary();
}

function updateSummary(){
  var box=document.getElementById("summary-box");
  if(!box) return;
  box.innerHTML="";
  var _c=autoCtr(),_r=autoRng(); var xMin=_c-_r/2, xMax=_c+_r/2;
  var ys=[];
  for(var i=0;i<=300;i++){
    var sp=xMin+(i/300)*(xMax-xMin);
    ys.push(calcPayoff(state.legs,sp));
  }
  // 행사가는 정확한 변곡점이므로 샘플링에 명시적으로 포함 (그리드 오차 방지)
  state.legs.forEach(function(l){
    if(l.k!==null && l.k>=xMin && l.k<=xMax){
      ys.push(calcPayoff(state.legs, l.k));
    }
  });
  var mx=Math.max.apply(null,ys), mn=Math.min.apply(null,ys);
  var beps=[];
  for(var i=0;i<ys.length-1;i++){
    if(ys[i]*ys[i+1]<0){
      var x0=xMin+(i/300)*(xMax-xMin),y0=ys[i],x1=xMin+((i+1)/300)*(xMax-xMin),y1=ys[i+1];
      beps.push(parseFloat((x0-y0*(x1-x0)/(y1-y0)).toFixed(2)));
    }
  }
  function ufmt(v){ return state.unit==="pt"?sgn(v,2)+"pt":krw(v/1); }
  function ufmtV(v){ return state.unit==="pt"?sgn(v,2)+"pt":krw(v); }

  var sg=document.createElement("div"); sg.className="stat-grid";
  [{lbl:"최대 이익",v:mx,col:mx>=0?"#4ade80":"#f87171"},
   {lbl:"최대 손실",v:mn,col:mn<0?"#f87171":"#4ade80"}].forEach(function(item){
    var sb=document.createElement("div"); sb.className="stat-box";
    var sl=document.createElement("div"); sl.className="stat-lbl"; sl.textContent=item.lbl;
    var sv=document.createElement("div"); sv.className="stat-val"; sv.style.color=item.col;
    sv.textContent=state.unit==="pt"?sgn(item.v,2)+"pt":krw(item.v);
    sb.appendChild(sl); sb.appendChild(sv); sg.appendChild(sb);
  });
  box.appendChild(sg);

  var belbl=document.createElement("div"); belbl.className="be-lbl"; belbl.textContent="손익분기점";
  box.appendChild(belbl);
  if(beps.length===0){
    var nd=document.createElement("span"); nd.style.cssText="font-size:12px;color:#2d5a7a"; nd.textContent="—";
    box.appendChild(nd);
  } else {
    beps.forEach(function(b){
      var chip=document.createElement("span"); chip.className="be-chip"; chip.textContent=b.toFixed(2);
      box.appendChild(chip);
    });
  }
}

function renderRight(){
  var el=document.getElementById("right");
  if(!document.getElementById("chart-canvas")){
    el.innerHTML="";
    // chart box
    var cb=document.createElement("div"); cb.className="chart-box";
    var ct=document.createElement("div"); ct.className="chart-title";
    ct.textContent="만기 손익 다이어그램";
    cb.appendChild(ct);
    var tipEl=document.createElement("div"); tipEl.id="chart-tip";
    tipEl.style.cssText="display:none;position:absolute;background:#0f1923;border:1px solid #2a3a4a;border-radius:6px;padding:8px 12px;font-size:13px;pointer-events:none;z-index:10";
    cb.style.position="relative";
    cb.appendChild(tipEl);
    var cvs=document.createElement("canvas"); cvs.id="chart-canvas";
    cb.appendChild(cvs);
    el.appendChild(cb);

    // table
    var tb=document.createElement("div"); tb.className="tbl-box";
    var tt=document.createElement("div"); tt.className="tbl-title"; tt.textContent="레그별 비용 구조";
    tb.appendChild(tt);
    var tw=document.createElement("div"); tw.id="tbl-wrap"; tb.appendChild(tw);
    el.appendChild(tb);

    setTimeout(function(){
      drawChart();
      setupTooltip(document.getElementById("chart-canvas"));
      renderTable();
      updateSummary();
    },0);
  } else {
    drawChart();
    renderTable();
    updateSummary();
  }
}

function renderTable(){
  var wrap=document.getElementById("tbl-wrap");
  if(!wrap) return;
  wrap.innerHTML="";
  var tbl=document.createElement("table");
  var thead=document.createElement("thead");
  var hr=document.createElement("tr");
  ["구분","콜/풋","행사가","수량","프리미엄","순비용(pt)","순비용(원)"].forEach(function(h){
    var th=document.createElement("th"); th.textContent=h; hr.appendChild(th);
  });
  thead.appendChild(hr); tbl.appendChild(thead);

  var tbody=document.createElement("tbody");
  var validLegs=state.legs.filter(function(l){return l.p!==null;});
  var tot=validLegs.length===0?null:validLegs.reduce(function(s,l){return s+(l.d==="B"?1:-1)*l.p*l.q;},0);

  state.legs.forEach(function(leg){
    var sg=leg.d==="B"?1:-1;
    var cost=leg.p===null?null:sg*leg.p*leg.q;
    var cc=cost===null?"#2d5a7a":cost<=0?"#4ade80":"#f87171";
    var tr=document.createElement("tr");
    function td(txt,col,left){
      var t=document.createElement("td");
      t.textContent=txt; if(col)t.style.color=col; if(left)t.className="left";
      return t;
    }
    tr.appendChild(td(leg.d==="B"?"매수":"매도",leg.d==="B"?"#4ade80":"#f87171",true));
    tr.appendChild(td(leg.t==="C"?"콜":"풋"));
    tr.appendChild(td(leg.k===null?"—":Number(leg.k).toFixed(2),leg.k===null?"#2d5a7a":null));
    tr.appendChild(td(leg.q));
    tr.appendChild(td(leg.p===null?"—":Number(leg.p).toFixed(2),leg.p===null?"#2d5a7a":null));
    tr.appendChild(td(fpt(cost),cc));
    tr.appendChild(td(fwon(cost),cc));
    tbody.appendChild(tr);
  });

  // 합계
  var tr2=document.createElement("tr"); tr2.style.background="#061018"; tr2.style.borderTop="1px solid #2a3a4a";
  var tc=tot===null?"#2d5a7a":tot<=0?"#4ade80":"#f87171";
  function td2(txt,col,span,left){
    var t=document.createElement("td"); t.textContent=txt;
    if(col)t.style.color=col; if(span)t.colSpan=span; if(left)t.className="left";
    t.style.fontWeight="700"; return t;
  }
  tr2.appendChild(td2("합계","#4a7a99",5,true));
  tr2.appendChild(td2(fpt(tot),tc));
  tr2.appendChild(td2(fwon(tot),tc));
  tbody.appendChild(tr2);

  tbl.appendChild(tbody);
  wrap.appendChild(tbl);
}

function mkSec(title, actionEl){
  var wrap=document.createElement("div"); wrap.className="sec";
  var hd=document.createElement("div"); hd.className="sec-hd";
  var sp=document.createElement("span"); sp.textContent=title;
  hd.appendChild(sp);
  if(actionEl) hd.appendChild(actionEl);
  wrap.appendChild(hd);
  var body=document.createElement("div");
  wrap.appendChild(body);
  return {wrap:wrap, body:body};
}

window.addEventListener("resize",function(){
  if(document.getElementById("chart-canvas")) drawChart();
});

render();
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
